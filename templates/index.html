<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票查詢與視覺化系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .quick-btn { transition: all 0.2s; }
        .quick-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-2">📈股票查詢與視覺化系統</h1>
        <p class="text-center text-muted">基於 Flask RESTful API 與數據標準化管道</p>
        
        <div class="row justify-content-center mb-3">
            <div class="col-md-10 text-center">
                <div class="card shadow-sm p-3 bg-white rounded">
                    <h6 class="text-muted mb-2 text-start fw-bold">🚀現有的快速動態查詢：</h6>
                    <div class="d-flex flex-wrap gap-2 justify-content-start">
                        <button class="btn btn-outline-primary quick-btn fw-bold" onclick="setTicker('2330.TW')">🏢 台積電 (2330)</button>
                        <button class="btn btn-outline-success quick-btn fw-bold" onclick="setTicker('2317.TW')">🦊 鴻海 (2317)</button>
                        <button class="btn btn-outline-danger quick-btn fw-bold" onclick="setTicker('2454.TW')">💎 聯發科 (2454)</button>
                        <button class="btn btn-outline-warning text-dark quick-btn fw-bold" onclick="setTicker('0050.TW')">🇹🇼 元大台灣50 (0050)</button>
                        <button class="btn btn-outline-info text-dark quick-btn fw-bold" onclick="setTicker('2303.TW')">⚡ 聯電 (2303)</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-md-10">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-secondary text-white">自訂查詢</span>
                    <input type="text" id="tickerInput" class="form-control" placeholder="輸入其他股票代碼 (例如美股: AAPL, NVDA)" value="2330.TW">
                    <button class="btn btn-primary" type="button" id="searchBtn">送出查詢</button>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-10 bg-white p-4 rounded shadow-sm mb-4">
                <h4 id="chartTitle" class="text-secondary text-center mb-2">正在載入數據...</h4>
                <div style="position: relative; height:350px;">
                    <canvas id="stockChart"></canvas>
                </div>
            </div>

            <div class="col-md-10 bg-white p-4 rounded shadow-sm">
                <h3 class="mb-3">原始數據 (Data Table)</h3>
                <div class="table-responsive">
                    <table class="table table-striped table-hover text-center">
                        <thead class="table-dark">
                            <tr>
                                <th>日期 (Date)</th>
                                <th>開盤價 (Open)</th>
                                <th>最高價 (High)</th>
                                <th>最低價 (Low)</th>
                                <th>收盤價 (Close)</th>
                                <th>成交量 (Volume)</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stockChartInstance = null; 

        // 快速切換代碼
        function setTicker(tickerCode) {
            document.getElementById('tickerInput').value = tickerCode;
            loadStockData(tickerCode);
        }

        function loadStockData(ticker) {
            document.getElementById('chartTitle').innerText = `📊 正在查詢 ${ticker} 數據...`;
            
            fetch(`/api/stock?ticker=${ticker}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(data.error);
                        return;
                    }

                    document.getElementById('chartTitle').innerText = `📈 ${ticker} 近期1個月股價走勢`;
                    const dates = [];
                    const closePrices = [];
                    const tableBody = document.getElementById('data-table-body');
                    tableBody.innerHTML = ""; 

                    data.forEach(row => {
                        const dateVal = row.date || "無日期";
                        const openVal = parseFloat(row.open || 0).toFixed(2);
                        const highVal = parseFloat(row.high || 0).toFixed(2);
                        const lowVal = parseFloat(row.low || 0).toFixed(2);
                        const closeVal = parseFloat(row.close || 0).toFixed(2);
                        const volumeVal = parseInt(row.volume || 0).toLocaleString();

                        dates.push(dateVal);
                        closePrices.push(closeVal);

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${dateVal}</td>
                            <td>${openVal}</td>
                            <td>${highVal}</td>
                            <td>${lowVal}</td>
                            <td class="fw-bold text-danger">${closeVal}</td>
                            <td>${volumeVal}</td>
                        `;
                        tableBody.appendChild(tr);
                    });

                    if (stockChartInstance) {
                        stockChartInstance.destroy();
                    }

                    const ctx = document.getElementById('stockChart').getContext('2d');
                    stockChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                label: `${ticker} 收盤價`,
                                data: closePrices,
                                borderColor: 'rgb(54, 162, 235)',
                                backgroundColor: 'rgba(54, 162, 235, 0.1)',
                                tension: 0.2,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false
                        }
                    });
                })
                .catch(error => console.error('Fetch 錯誤:', error));
        }

        document.getElementById('searchBtn').addEventListener('click', () => {
            const ticker = document.getElementById('tickerInput').value.trim();
            if(ticker) loadStockData(ticker);
        });

        document.addEventListener("DOMContentLoaded", () => {
            loadStockData("2330.TW");
        });
    </script>
</body>
</html>
